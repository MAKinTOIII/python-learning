name: Python CI

on: [push]

jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Run lesson1
        run: python lesson1.py
      - name: Run lesson2
        run: python lesson2.pygit 